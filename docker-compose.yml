version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lvy
      POSTGRES_PASSWORD: lvy
      POSTGRES_DB: lvy
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"

  server:
    build: ./server
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgresql://lvy:lvy@postgres:5432/lvy
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-prod
      JWT_REFRESH_SECRET: change-me-in-prod-too
      CLIENT_URL: http://localhost:5173
      PORT: 4000
    ports:
      - "4000:4000"

  client:
    build: ./client
    depends_on: [server]
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    ports:
      - "5173:5173"

volumes:
  pgdata:
