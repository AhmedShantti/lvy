      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200':
          description: Order.
          content:
            application/json:
              schema: { type: object, properties: { order: { $ref: '#/components/schemas/Order' } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/orders/{id}/status:
    patch:
      tags: [Admin · Orders]
      summary: Update order status
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: '#/components/schemas/OrderStatus' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { order: { $ref: '#/components/schemas/Order' } } }

  /admin/orders/{id}/payment:
    patch:
      tags: [Admin · Orders]
      summary: Update payment status
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentStatus]
              properties:
                paymentStatus: { $ref: '#/components/schemas/PaymentStatus' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { order: { $ref: '#/components/schemas/Order' } } }

  /admin/orders/{id}/notes:
    patch:
      tags: [Admin · Orders]
      summary: Update internal notes
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notes]
              properties:
                notes: { type: string, maxLength: 1000 }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { order: { $ref: '#/components/schemas/Order' } } }

  /admin/orders/{id}/refund:
    post:
      tags: [Admin · Orders]
      summary: Refund an order (sets status + payment to REFUNDED)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200':
          description: Refunded.
          content:
            application/json:
              schema: { type: object, properties: { order: { $ref: '#/components/schemas/Order' } } }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Admin · Users ───────────────────────────
  /admin/users:
    get:
      tags: [Admin · Users]
      summary: List users (all roles)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: role, schema: { $ref: '#/components/schemas/Role' } }
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 25, maximum: 100 } }
      responses:
        '200':
          description: Paginated users.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      items: { type: array, items: { $ref: '#/components/schemas/User' } }

  /admin/users/{id}:
    get:
      tags: [Admin · Users]
      summary: Get a user (with addresses + orders)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema: { type: object, properties: { user: { $ref: '#/components/schemas/User' } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users/{id}/role:
    patch:
      tags: [Admin · Users]
      summary: Change a user's role
      description: Cannot demote the last remaining admin (returns 400).
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { $ref: '#/components/schemas/Role' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { user: { $ref: '#/components/schemas/User' } } }
        '400': { $ref: '#/components/responses/BadRequest' }

  /admin/customers:
    get:
      tags: [Admin · Users]
      summary: List customers (CUSTOMER role only, with lifetime value)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 25, maximum: 100 } }
      responses:
        '200':
          description: Paginated customers.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      items: { type: array, items: { type: object } }

  /admin/customers/{id}:
    get:
      tags: [Admin · Users]
      summary: Customer detail (orders, addresses, reviews)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200':
          description: Customer.
          content:
            application/json:
              schema: { type: object, properties: { customer: { $ref: '#/components/schemas/User' } } }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Admin · Marketing ───────────────────────────
  /admin/coupons:
    get:
      tags: [Admin · Marketing]
      summary: List coupons
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Coupons.
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Coupon' } } } }
    post:
      tags: [Admin · Marketing]
      summary: Create a coupon
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CouponInput' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { type: object, properties: { coupon: { $ref: '#/components/schemas/Coupon' } } }

  /admin/coupons/{id}:
    put:
      tags: [Admin · Marketing]
      summary: Update a coupon (partial)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CouponInput' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { coupon: { $ref: '#/components/schemas/Coupon' } } }
    delete:
      tags: [Admin · Marketing]
      summary: Delete a coupon
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { $ref: '#/components/responses/Ok' }

  /admin/coupons/{id}/toggle:
    patch:
      tags: [Admin · Marketing]
      summary: Toggle a coupon's active flag
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { coupon: { $ref: '#/components/schemas/Coupon' } } }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Admin · Reviews ───────────────────────────
  /admin/reviews:
    get:
      tags: [Admin · Reviews]
      summary: List reviews for moderation
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: status, schema: { type: string, enum: [pending, approved, all], default: pending } }
      responses:
        '200':
          description: Reviews (with user + product).
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Review' } } } }

  /admin/reviews/{id}/approve:
    patch:
      tags: [Admin · Reviews]
      summary: Approve a review (recomputes product rating)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200':
          description: Approved.
          content:
            application/json:
              schema: { type: object, properties: { review: { $ref: '#/components/schemas/Review' } } }

  /admin/reviews/{id}/reject:
    patch:
      tags: [Admin · Reviews]
      summary: Unpublish a review (recomputes product rating)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200':
          description: Unpublished.
          content:
            application/json:
              schema: { type: object, properties: { review: { $ref: '#/components/schemas/Review' } } }

  /admin/reviews/{id}:
    delete:
      tags: [Admin · Reviews]
      summary: Delete a review (recomputes product rating)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { $ref: '#/components/responses/Ok' }

  /admin/reviews/bulk-approve:
    post:
      tags: [Admin · Reviews]
      summary: Approve many reviews at once
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids: { type: array, items: { type: string } }
      responses:
        '200':
          description: Result.
          content:
            application/json:
              schema: { type: object, properties: { ok: { type: boolean }, count: { type: integer } } }

  # ─────────────────────────── Admin · Settings (incl. shipping zones) ───────────────────────────
  /admin/shipping-zones:
    get:
      tags: [Admin · Settings]
      summary: List shipping zones
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Zones.
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/ShippingZone' } } } }
    post:
      tags: [Admin · Settings]
      summary: Create a shipping zone
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShippingZoneInput' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { type: object, properties: { zone: { $ref: '#/components/schemas/ShippingZone' } } }

  /admin/shipping-zones/{id}:
    put:
      tags: [Admin · Settings]
      summary: Update a shipping zone (partial)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShippingZoneInput' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { zone: { $ref: '#/components/schemas/ShippingZone' } } }
    delete:
      tags: [Admin · Settings]
      summary: Delete a shipping zone
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { $ref: '#/components/responses/Ok' }

  /admin/settings:
    get:
      tags: [Admin · Settings]
      summary: Get all settings (merged with defaults)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Settings map.
          content:
            application/json:
              schema: { type: object, properties: { settings: { type: object, additionalProperties: true } } }
    put:
      tags: [Admin · Settings]
      summary: Bulk upsert settings
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200': { $ref: '#/components/responses/Ok' }

  /admin/settings/{key}:
    put:
      tags: [Admin · Settings]
      summary: Upsert a single setting
      security: [{ bearerAuth: [] }]
      parameters: [{ in: path, name: key, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: {}
      responses:
        '200':
          description: Upserted.
          content:
            application/json:
              schema: { type: object, properties: { setting: { type: object } } }

  # ─────────────────────────── Admin · Content ───────────────────────────
  /admin/content/pages:
    get:
      tags: [Admin · Content]
      summary: List CMS pages (with section counts)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Pages.
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Page' } } } }

  /admin/content/pages/{slug}:
    get:
      tags: [Admin · Content]
      summary: Get a page with ordered sections (auto-seeds "home")
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Slug' }]
      responses:
        '200':
          description: Page.
          content:
            application/json:
              schema: { type: object, properties: { page: { $ref: '#/components/schemas/Page' } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/content/pages/{slug}/reset:
    post:
      tags: [Admin · Content]
      summary: Reset a page to defaults (home only)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Slug' }]
      responses:
        '200':
          description: Reset page.
          content:
            application/json:
              schema: { type: object, properties: { page: { $ref: '#/components/schemas/Page' } } }
        '400': { $ref: '#/components/responses/BadRequest' }

  /admin/content/sections/{id}:
    put:
      tags: [Admin · Content]
      summary: Update a content section (data / enabled / order)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data: { type: object }
                enabled: { type: boolean }
                order: { type: integer }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { section: { type: object } } }

  # ─────────────────────────── Admin · Media ───────────────────────────
  /admin/media:
    get:
      tags: [Admin · Media]
      summary: List local public image files (dev convenience)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Files.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        url: { type: string }

  /admin/upload:
    post:
      tags: [Admin · Media]
      summary: Upload an image to Supabase Storage
      description: >
        Send the raw image file as the request body (NOT multipart/form-data) with the file's
        MIME type as Content-Type. Returns the public URL to store in product/category/collection
        image fields. Image MIME types only, ≤ 20 MB. Requires SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          image/png: { schema: { type: string, format: binary } }
          image/jpeg: { schema: { type: string, format: binary } }
          image/webp: { schema: { type: string, format: binary } }
          image/avif: { schema: { type: string, format: binary } }
          image/gif: { schema: { type: string, format: binary } }
      responses:
        '201':
          description: Uploaded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/ServerError' }
        '502': { description: Upstream storage upload failed. }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: { type: string }
    Slug:
      in: path
      name: slug
      required: true
      schema: { type: string }

  responses:
    Ok:
      description: Success.
      content:
        application/json:
          schema: { type: object, properties: { ok: { type: boolean, example: true } } }
    BadRequest:
      description: Bad request / business-rule violation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid token / credentials.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not allowed (e.g. non-admin).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Conflict (duplicate / already linked).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Zod validation failure.
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: Validation failed }
              issues: { type: array, items: { type: object } }
    ServerError:
      description: Server error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }

    Role:
      type: string
      enum: [CUSTOMER, ADMIN]
    OrderStatus:
      type: string
      enum: [PENDING, CONFIRMED, PACKED, SHIPPED, OUT_FOR_DELIVERY, DELIVERED, CANCELLED, REFUNDED]
    PaymentStatus:
      type: string
      enum: [PENDING, PAID, FAILED, REFUNDED]
    DeliveryTier:
      type: string
      enum: [STANDARD, EXPRESS, WHITE_GLOVE]

    Paginated:
      type: object
      properties:
        total: { type: integer }
        page: { type: integer }
        pages: { type: integer }

    Money:
      type: string
      description: Decimal serialized as a string, e.g. "1299.00" (currency EGP).
      example: "1299.00"

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        name: { type: string, minLength: 2 }
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    AuthSession:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        accessToken: { type: string }
        refreshToken: { type: string }

    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        phone: { type: string, nullable: true }
        emailVerified: { type: boolean }
        createdAt: { type: string, format: date-time }
        addresses:
          type: array
          items: { $ref: '#/components/schemas/Address' }

    Address:
      type: object
      properties:
        id: { type: string }
        fullName: { type: string }
        line1: { type: string }
        line2: { type: string, nullable: true }
        city: { type: string }
        region: { type: string }
        postal: { type: string }
        country: { type: string }
        phone: { type: string }
        isDefault: { type: boolean }

    Category:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        image: { type: string, nullable: true }
        _count:
          type: object
          properties: { products: { type: integer } }
    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        image: { type: string }

    Collection:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        cover: { type: string, nullable: true }
        _count:
          type: object
          properties: { products: { type: integer } }
    CollectionInput:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        cover: { type: string }

    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        price: { $ref: '#/components/schemas/Money' }
        compareAt: { $ref: '#/components/schemas/Money' }
        currency: { type: string, example: EGP }
        images: { type: array, items: { type: string } }
        material: { type: string, nullable: true }
        color: { type: string, nullable: true }
        dimensions: { type: string, nullable: true }
        stock: { type: integer }
        featured: { type: boolean }
        isNew: { type: boolean }
        rating: { type: number }
        categoryId: { type: string }
        category: { $ref: '#/components/schemas/Category' }
        createdAt: { type: string, format: date-time }
    ProductInput:
      type: object
      required: [name, slug, description, price, images, categoryId]
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        price: { type: number }
        compareAt: { type: number }
        images: { type: array, items: { type: string } }
        categoryId: { type: string }
        stock: { type: integer, default: 0 }
        material: { type: string }
        color: { type: string }
        dimensions: { type: string }
        featured: { type: boolean }
        isNew: { type: boolean }

    Variant:
      type: object
      properties:
        id: { type: string }
        productId: { type: string }
        name: { type: string }
        sku: { type: string }
        color: { type: string, nullable: true }
        size: { type: string, nullable: true }
        price: { $ref: '#/components/schemas/Money' }
        stock: { type: integer }
    VariantInput:
      type: object
      required: [productId, name, sku, price]
      properties:
        productId: { type: string }
        name: { type: string }
        sku: { type: string }
        color: { type: string }
        size: { type: string }
        price: { type: number }
        stock: { type: integer, default: 0 }

    CartItem:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        productId: { type: string }
        quantity: { type: integer }
        variant: { type: string, nullable: true }
        product: { $ref: '#/components/schemas/Product' }

    OrderInput:
      type: object
      required: [email, items, address]
      properties:
        email: { type: string, format: email }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId: { type: string }
              quantity: { type: integer, minimum: 1 }
              variant: { type: string }
        address:
          type: object
          required: [fullName, line1, city, region, postal, country, phone]
          properties:
            fullName: { type: string }
            line1: { type: string }
            line2: { type: string }
            city: { type: string }
            region: { type: string }
            postal: { type: string }
            country: { type: string }
            phone: { type: string }
        deliveryTier: { $ref: '#/components/schemas/DeliveryTier' }
        couponCode: { type: string }
        notes: { type: string }

    OrderItem:
      type: object
      properties:
        id: { type: string }
        productId: { type: string }
        name: { type: string }
        image: { type: string, nullable: true }
        price: { $ref: '#/components/schemas/Money' }
        quantity: { type: integer }
        variant: { type: string, nullable: true }

    Order:
      type: object
      properties:
        id: { type: string }
        number: { type: string }
        email: { type: string, format: email }
        userId: { type: string, nullable: true }
        subtotal: { $ref: '#/components/schemas/Money' }
        shipping: { $ref: '#/components/schemas/Money' }
        tax: { $ref: '#/components/schemas/Money' }
        discount: { $ref: '#/components/schemas/Money' }
        total: { $ref: '#/components/schemas/Money' }
        currency: { type: string, example: EGP }
        deliveryTier: { $ref: '#/components/schemas/DeliveryTier' }
        status: { $ref: '#/components/schemas/OrderStatus' }
        paymentStatus: { $ref: '#/components/schemas/PaymentStatus' }
        couponCode: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        address: { $ref: '#/components/schemas/Address' }
        user: { $ref: '#/components/schemas/User' }

    Review:
      type: object
      properties:
        id: { type: string }
        productId: { type: string }
        userId: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        title: { type: string, nullable: true }
        body: { type: string }
        approved: { type: boolean }
        createdAt: { type: string, format: date-time }

    Coupon:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        type: { type: string, enum: [percent, fixed] }
        value: { $ref: '#/components/schemas/Money' }
        minTotal: { $ref: '#/components/schemas/Money' }
        expiresAt: { type: string, format: date-time, nullable: true }
        active: { type: boolean }
        usedCount: { type: integer }
    CouponInput:
      type: object
      required: [code, type, value]
      properties:
        code: { type: string }
        type: { type: string, enum: [percent, fixed] }
        value: { type: number }
        minTotal: { type: number }
        expiresAt: { type: string, format: date-time }
        active: { type: boolean, default: true }

    ShippingZone:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        postalPrefix: { type: string }
        standard: { $ref: '#/components/schemas/Money' }
        express: { $ref: '#/components/schemas/Money' }
        whiteGlove: { $ref: '#/components/schemas/Money' }
    ShippingZoneInput:
      type: object
      required: [name, postalPrefix, standard, express, whiteGlove]
      properties:
        name: { type: string }
        postalPrefix: { type: string }
        standard: { type: number }
        express: { type: number }
        whiteGlove: { type: number }

    Page:
      type: object
      properties:
        id: { type: string }
        slug: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        published: { type: boolean }
        sections:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              type: { type: string }
              order: { type: integer }
              enabled: { type: boolean }
              data: { type: object }
