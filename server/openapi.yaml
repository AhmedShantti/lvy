openapi: 3.0.3
info:
  title: LVY API
  version: "1.0.0"
  description: >
    REST API for the LVY premium-furniture e-commerce platform.

    **Auth:** JWT bearer tokens. Obtain via `POST /auth/login` or `POST /auth/verify-email`
    (registration requires email verification first). Send as `Authorization: Bearer <accessToken>`.

    **Conventions:** list endpoints return `{ items, total, page, pages }`; single resources
    return `{ <resource>: {...} }`; mutations with no body return `{ ok: true }`.
    Monetary fields are Prisma `Decimal` and serialize as JSON **strings** (e.g. `"1299.00"`).
    Currency is **EGP**.
  contact:
    name: LVY
servers:
  - url: https://lvy-p7an.onrender.com/api/v1
    description: Production (Render)
  - url: http://localhost:4000/api/v1
    description: Local development

tags:
  - name: Auth
  - name: Products
  - name: Categories
  - name: Cart
  - name: Orders
  - name: Payments
  - name: Shipping
  - name: Reviews
  - name: Content
  - name: Admin · Dashboard
  - name: Admin · Catalog
  - name: Admin · Orders
  - name: Admin · Users
  - name: Admin · Marketing
  - name: Admin · Reviews
  - name: Admin · Settings
  - name: Admin · Content
  - name: Admin · Media

paths:
  # ─────────────────────────── Auth ───────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register (creates an unverified account, emails a verification link)
      description: Does not return tokens. The account must verify its email before it can sign in.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterInput' }
      responses:
        '201':
          description: Account created; verification email dispatched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  verificationRequired: { type: boolean, example: true }
                  email: { type: string, format: email }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Sign in
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginInput' }
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Email not verified.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      code: { type: string, example: EMAIL_NOT_VERIFIED }

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify an email token (also signs the user in)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string, description: Hex token from the verification link }
      responses:
        '200':
          description: Verified and signed in.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend the verification email
      description: Always returns a generic OK; never reveals whether the email exists or is already verified.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { $ref: '#/components/responses/Ok' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New token pair.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  refreshToken: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Current user
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The authenticated user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ─────────────────────────── Products ───────────────────────────
  /products:
    get:
      tags: [Products]
      summary: List / search products
      parameters:
        - { in: query, name: q, schema: { type: string }, description: Name contains (case-insensitive) }
        - { in: query, name: category, schema: { type: string }, description: Category slug }
        - { in: query, name: minPrice, schema: { type: number } }
        - { in: query, name: maxPrice, schema: { type: number } }
        - { in: query, name: sort, schema: { type: string, enum: [new, price_asc, price_desc, rating] } }
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 12, maximum: 48 } }
        - { in: query, name: featured, schema: { type: boolean } }
      responses:
        '200':
          description: Paginated products.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Product' }

  /products/{slug}:
    get:
      tags: [Products]
      summary: Product detail by slug (with variants, approved reviews, related)
      parameters: [{ $ref: '#/components/parameters/Slug' }]
      responses:
        '200':
          description: Product + related.
          content:
            application/json:
              schema:
                type: object
                properties:
                  product: { $ref: '#/components/schemas/Product' }
                  related:
                    type: array
                    items: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Categories ───────────────────────────
  /categories:
    get:
      tags: [Categories]
      summary: List categories (with product counts)
      responses:
        '200':
          description: Categories.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }

  # ─────────────────────────── Cart ───────────────────────────
  /cart:
    get:
      tags: [Cart]
      summary: Get the current user's cart
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Cart items.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/CartItem' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Cart]
      summary: Add / increment a cart item
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId: { type: string }
                quantity: { type: integer, default: 1, minimum: 1 }
                variant: { type: string, nullable: true }
      responses:
        '200':
          description: Upserted cart item.
          content:
            application/json:
              schema:
                type: object
                properties:
                  item: { $ref: '#/components/schemas/CartItem' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /cart/{id}:
    delete:
      tags: [Cart]
      summary: Remove a cart item
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ─────────────────────────── Orders ───────────────────────────
  /orders:
    post:
      tags: [Orders]
      summary: Place an order (guest or authenticated)
      description: Pricing, shipping, tax, and discount are computed server-side. Optional auth links the order to the user.
      security: [{ bearerAuth: [] }, {}]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderInput' }
      responses:
        '200':
          description: Created order.
          content:
            application/json:
              schema:
                type: object
                properties:
                  order: { $ref: '#/components/schemas/Order' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /orders/mine:
    get:
      tags: [Orders]
      summary: List the current user's orders
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Orders.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /orders/claim:
    post:
      tags: [Orders]
      summary: Link a guest order to the current account
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [number, email]
              properties:
                number: { type: string }
                email: { type: string, format: email }
      responses:
        '200':
          description: Claimed (or already claimed) order.
          content:
            application/json:
              schema:
                type: object
                properties:
                  order: { $ref: '#/components/schemas/Order' }
                  alreadyClaimed: { type: boolean }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /orders/{number}:
    get:
      tags: [Orders]
      summary: Get an order by its public number
      parameters: [{ in: path, name: number, required: true, schema: { type: string } }]
      responses:
        '200':
          description: Order.
          content:
            application/json:
              schema:
                type: object
                properties:
                  order: { $ref: '#/components/schemas/Order' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Payments ───────────────────────────
  /payments/intent:
    post:
      tags: [Payments]
      summary: Create a Stripe PaymentIntent for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderNumber]
              properties:
                orderNumber: { type: string }
      responses:
        '200':
          description: Client secret for Stripe Elements.
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientSecret: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /payments/webhook:
    post:
      tags: [Payments]
      summary: Stripe webhook (raw body, signature-verified)
      description: >
        Consumes Stripe events. Mounted with a raw body parser and verified via the
        `stripe-signature` header + `STRIPE_WEBHOOK_SECRET`. Not called by clients.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, description: Raw Stripe event payload }
      responses:
        '200': { description: Received. }
        '400': { description: Signature verification failed. }

  # ─────────────────────────── Shipping ───────────────────────────
  /shipping/quote:
    post:
      tags: [Shipping]
      summary: Get delivery rates for a postal code + subtotal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [postal, subtotal]
              properties:
                postal: { type: string }
                subtotal: { type: number }
      responses:
        '200':
          description: Rates and ETAs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  standard: { type: number }
                  express: { type: number }
                  whiteGlove: { type: number }
                  etaDays:
                    type: object
                    properties:
                      standard: { type: string }
                      express: { type: string }
                      whiteGlove: { type: string }

  # ─────────────────────────── Reviews ───────────────────────────
  /reviews:
    post:
      tags: [Reviews]
      summary: Submit a product review (starts unapproved; one per user per product)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, rating, body]
              properties:
                productId: { type: string }
                rating: { type: integer, minimum: 1, maximum: 5 }
                title: { type: string, maxLength: 120 }
                body: { type: string, maxLength: 2000 }
      responses:
        '201':
          description: Created review (pending moderation).
          content:
            application/json:
              schema:
                type: object
                properties:
                  review: { $ref: '#/components/schemas/Review' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /reviews/mine:
    get:
      tags: [Reviews]
      summary: List the current user's reviews
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Reviews.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Review' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ─────────────────────────── Content ───────────────────────────
  /content/{slug}:
    get:
      tags: [Content]
      summary: Get a CMS page with its enabled sections
      parameters: [{ $ref: '#/components/parameters/Slug' }]
      responses:
        '200':
          description: Page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  page: { $ref: '#/components/schemas/Page' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Admin · Dashboard ───────────────────────────
  /admin/dashboard:
    get:
      tags: [Admin · Dashboard]
      summary: KPI summary
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Totals, recent orders, low stock.
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalOrders: { type: integer }
                  totalRevenue: { type: string }
                  totalUsers: { type: integer }
                  totalProducts: { type: integer }
                  recentOrders: { type: array, items: { $ref: '#/components/schemas/Order' } }
                  lowStockProducts: { type: array, items: { $ref: '#/components/schemas/Product' } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/stats:
    get:
      tags: [Admin · Dashboard]
      summary: Quick counts
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders: { type: integer }
                  customers: { type: integer }
                  products: { type: integer }
                  revenue: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/stats/timeseries:
    get:
      tags: [Admin · Dashboard]
      summary: Time-series data for charts
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: days, schema: { type: integer, default: 30, minimum: 7, maximum: 365 } }
      responses:
        '200':
          description: Series, top items, by-status, low stock.
          content:
            application/json:
              schema: { type: object }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ─────────────────────────── Admin · Catalog ───────────────────────────
  /admin/products:
    get:
      tags: [Admin · Catalog]
      summary: List products (admin; paginated, with category)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 50, maximum: 100 } }
      responses:
        '200':
          description: Paginated products.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      items: { type: array, items: { $ref: '#/components/schemas/Product' } }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Admin · Catalog]
      summary: Create a product
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '200':
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  product: { $ref: '#/components/schemas/Product' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /admin/products/{id}:
    put:
      tags: [Admin · Catalog]
      summary: Update a product (partial)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  product: { $ref: '#/components/schemas/Product' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Admin · Catalog]
      summary: Delete a product
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/products/{id}/featured:
    patch:
      tags: [Admin · Catalog]
      summary: Toggle the product's "featured" flag
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200':
          description: Updated product.
          content:
            application/json:
              schema: { type: object, properties: { product: { $ref: '#/components/schemas/Product' } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/products/{id}/new:
    patch:
      tags: [Admin · Catalog]
      summary: Toggle the product's "isNew" flag
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200':
          description: Updated product.
          content:
            application/json:
              schema: { type: object, properties: { product: { $ref: '#/components/schemas/Product' } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/variants:
    get:
      tags: [Admin · Catalog]
      summary: List variants for a product
      security: [{ bearerAuth: [] }]
      parameters: [{ in: query, name: productId, required: true, schema: { type: string } }]
      responses:
        '200':
          description: Variants.
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Variant' } } } }
    post:
      tags: [Admin · Catalog]
      summary: Create a variant
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VariantInput' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { type: object, properties: { variant: { $ref: '#/components/schemas/Variant' } } }

  /admin/variants/{id}:
    put:
      tags: [Admin · Catalog]
      summary: Update a variant (partial)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VariantInput' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { variant: { $ref: '#/components/schemas/Variant' } } }
    delete:
      tags: [Admin · Catalog]
      summary: Delete a variant
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { $ref: '#/components/responses/Ok' }

  /admin/categories:
    get:
      tags: [Admin · Catalog]
      summary: List categories (with product counts)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Categories.
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Category' } } } }
    post:
      tags: [Admin · Catalog]
      summary: Create a category
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryInput' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { type: object, properties: { category: { $ref: '#/components/schemas/Category' } } }

  /admin/categories/{id}:
    put:
      tags: [Admin · Catalog]
      summary: Update a category (partial)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryInput' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { category: { $ref: '#/components/schemas/Category' } } }
    delete:
      tags: [Admin · Catalog]
      summary: Delete a category
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { $ref: '#/components/responses/Ok' }

  /admin/collections:
    get:
      tags: [Admin · Catalog]
      summary: List collections (with product counts)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Collections.
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Collection' } } } }
    post:
      tags: [Admin · Catalog]
      summary: Create a collection
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionInput' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema: { type: object, properties: { collection: { $ref: '#/components/schemas/Collection' } } }

  /admin/collections/{id}:
    put:
      tags: [Admin · Catalog]
      summary: Update a collection (partial)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionInput' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { type: object, properties: { collection: { $ref: '#/components/schemas/Collection' } } }
    delete:
      tags: [Admin · Catalog]
      summary: Delete a collection
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses:
        '200': { $ref: '#/components/responses/Ok' }

  # ─────────────────────────── Admin · Orders ───────────────────────────
  /admin/orders:
    get:
      tags: [Admin · Orders]
      summary: Latest 100 orders (with items + shipment)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Orders.
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Order' } } } }

  /admin/orders-paged:
    get:
      tags: [Admin · Orders]
      summary: Paginated / searchable orders
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: status, schema: { $ref: '#/components/schemas/OrderStatus' } }
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: Paginated orders.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      items: { type: array, items: { $ref: '#/components/schemas/Order' } }

  /admin/orders.csv:
    get:
      tags: [Admin · Orders]
      summary: Export orders as CSV (max 1000)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: CSV file.
          content:
            text/csv:
              schema: { type: string }

  /admin/orders/{id}:
    get:
      tags: [Admin · Orders]
